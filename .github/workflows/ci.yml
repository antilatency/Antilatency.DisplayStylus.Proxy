name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Bootstrap dependencies
        shell: pwsh
        run: ./scripts/bootstrap.ps1

      - name: Build
        shell: pwsh
        run: dotnet build ./Antilatency.DisplayStylus.Proxy.sln --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test ./tests/Antilatency.DisplayStylus.Proxy.Tests/Antilatency.DisplayStylus.Proxy.Tests.csproj --configuration Release --no-build

      - name: Process smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1
