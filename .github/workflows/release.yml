name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-test-release:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Validate release version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
              throw "Release tags must use vMAJOR.MINOR.PATCH; received '$tag'."
          }

          $version = $tag.Substring(1)
          [xml]$buildProperties = Get-Content ./Directory.Build.props
          $assemblyVersion = [string]$buildProperties.Project.PropertyGroup.VersionPrefix

          if ($assemblyVersion -ne $version) {
              throw "Tag $tag does not match proxy version '$assemblyVersion'."
          }

      - name: Bootstrap dependencies
        shell: pwsh
        run: ./scripts/bootstrap.ps1

      - name: Build
        shell: pwsh
        run: dotnet build ./Antilatency.DisplayStylus.Proxy.sln --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test ./tests/Antilatency.DisplayStylus.Proxy.Tests/Antilatency.DisplayStylus.Proxy.Tests.csproj --configuration Release --no-build

      - name: Process smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1

      - name: Publish production package
        shell: pwsh
        run: ./scripts/publish-production.ps1

      - name: Prepare release assets
        id: assets
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $source = './artifacts/production/Antilatency.DisplayStylus.Proxy-win-x64.zip'
          $asset = "./artifacts/production/Antilatency.DisplayStylus.Proxy-$tag-win-x64.zip"
          Copy-Item -LiteralPath $source -Destination $asset

          $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksum = "$asset.sha256"
          [IO.File]::WriteAllText(
              $checksum,
              "$hash *$(Split-Path -Leaf $asset)`n",
              [Text.UTF8Encoding]::new($false))

          "archive=$asset" >> $env:GITHUB_OUTPUT
          "checksum=$checksum" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release view $env:RELEASE_TAG --json tagName *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $env:RELEASE_TAG `
                  '${{ steps.assets.outputs.archive }}' `
                  '${{ steps.assets.outputs.checksum }}' `
                  --clobber
          } else {
              gh release create $env:RELEASE_TAG `
                  '${{ steps.assets.outputs.archive }}' `
                  '${{ steps.assets.outputs.checksum }}' `
                  --verify-tag `
                  --generate-notes `
                  --title $env:RELEASE_TAG
          }
